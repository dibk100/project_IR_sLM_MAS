experiment:
  name: exp2_qwen2p5_policy_v0_smoke
  description: 'Experiment 2 Step1: Pre-harness hard-coded failure-aware policy with
    one retry.'
  taxonomy_version: exp2_step1_policy_v0
  max_tasks: 100
  max_trials: 1
  task_subset: data/swe_bench_lite_test.jsonl
  seed: 42
  run_id: exp2_step1_policy_v0_smoke100
agent:
  provider: vllm
  base_url: http://localhost:8000/v1
  api_key: EMPTY
  model: Qwen/Qwen2.5-Coder-7B-Instruct
  temperature: 0.0
  max_tokens: 1024
  timeout: 300
  max_retries: 0
constraints:
  context_max_files: 80
  max_files: 2
environment:
  timeout_seconds: 300
policy:
  enabled: true
  max_attempts: 2
  trimmed_context_files: 20
  trimmed_max_files: 2
  schema_retry_max_files: 2
  expanded_context_files: 80
  expanded_max_files: 4
