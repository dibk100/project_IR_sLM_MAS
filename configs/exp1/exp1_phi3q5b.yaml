experiment:
  name: "exp1_phi3q5b_inst_baseline"
  description: "Experiment 1: Baseline generation with simple diff agent. No repair."
  taxonomy_version: "rollback_exp1_fin_v1"
  max_tasks: 300
  max_trials: 1
  task_subset: "data/swe_bench_lite_test.jsonl"
  seed: 42
  run_id : "sLMs-phi3binst-300"
  
agent:
  provider: "vllm"
  base_url: "http://localhost:8000/v1"
  api_key: "EMPTY"
  model: "microsoft/Phi-3.5-mini-instruct"
  temperature: 0.0
  max_tokens: 1024    # 1024       # context size : 4096
  timeout: 300
  max_retries: 0
  
constraints:
  context_max_files: 80

environment:
  timeout_seconds: 300 # 5 minutes per task