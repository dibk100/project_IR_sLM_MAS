experiment:
  name: "exp1_qwen2p5_baseline"
  description: "Experiment 1: Baseline generation with simple diff agent. No repair."
  taxonomy_version: "rollback_exp1_docker_v2"
  max_tasks: 200
  max_trials: 1
  task_subset: "data/swe_bench_lite_test.jsonl"
  seed: 42
  run_id : "rollback_exp1_docker_v2-200"
  
agent:
  provider: "vllm"
  base_url: "http://localhost:8000/v1"
  api_key: "EMPTY"
  model: "Qwen/Qwen2.5-Coder-7B-Instruct"
  temperature: 0.0
  max_tokens: 1024    # 1024       # context size : 4096
  
constraints:
  context_max_files: 80

environment:
  timeout_seconds: 300 # 5 minutes per task
  docker_image: "python:3.10-slim"      # "swebench/sweb.eval.x86_64:latest"
