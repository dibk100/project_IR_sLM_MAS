experiment:
  name: "exp1_qwen2p5_baseline"
  description: "Experiment 1: Baseline generation with simple diff agent. No repair."
  taxonomy_version: "exp1_step2-6"
  max_tasks: 300
  max_trials: 1
  task_subset: "data/swe_bench_lite_test.jsonl"
  seed: 42
  run_id : "exp1-Baseline-qwen-300_context_8_token_1024"     
  ## context_8_token_1024, context_32_token_1024, context_32_token_2048, context_4_token_512
  
agent:
  provider: "vllm"
  base_url: "http://localhost:8000/v1"
  api_key: "EMPTY"
  model: "Qwen/Qwen2.5-Coder-7B-Instruct"
  temperature: 0.0
  max_tokens: 1024    # 2048 / 1024 / 512       # context size : 4096 / 8192  / 32768
  
constraints:
  context_max_files: 80

environment:
  timeout_seconds: 300 # 5 minutes per task
  docker_image: "python:3.10-slim"
